services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ghostcrawler_data:/app/data
    command: ["python", "-m", "core.collector_service"]
    networks:
      - default
      - edge_shared

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: ghostcrawler-dashboard
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GHOSTCRAWLER_ENV: production
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ENABLECORS: "false"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    expose:
      - "8501"
    volumes:
      - ghostcrawler_data:/app/data
    command:
      [
        "streamlit",
        "run",
        "cli/dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    networks:
      - default
      - edge_shared

volumes:
  ghostcrawler_data:

networks:
  edge_shared:
    external: true